<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vendorzo Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #151518;
        color: #f4f4f5;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      main {
        width: min(100%, 440px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.03);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>Vendorzo can’t reach the network right now. Reconnect to continue syncing your POS workspace.</p>
    </main>
  </body>
</html>
